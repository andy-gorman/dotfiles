# Default layout for new windows: nvim left, claude top-right (80%), cli bottom-right (20%)
set-hook -g after-new-window 'split-window -h -p 50 -c "#{pane_current_path}" \; split-window -v -p 20 -c "#{pane_current_path}" \; send-keys -t .1 "nvim ." Enter \; send-keys -t .2 "claude" Enter \; select-pane -t .3'
